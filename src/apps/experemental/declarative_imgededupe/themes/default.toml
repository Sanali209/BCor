name = "Dark Ocean"
description = "Default dark theme with BCor blue accents"

[colors]
# Backgrounds
bg-main = "#121212"
bg-paper = "#1e1e1e"
bg-hover = "#2b2b2b"
bg-active = "#333333"

# Foregrounds
fg-main = "#ffffff"
fg-muted = "#888888"
fg-disabled = "#555555"

# Accents
primary = "#0288d1"
primary-light = "#4fc3f7"
primary-dark = "#01579b"
accent = "#ff4081"

# Semantic
success = "#4caf50"
warning = "#ff9800"
error = "#f44336"
info = "#2196f3"

# Borders
border-dim = "#333333"
border-highlight = "#444444"
