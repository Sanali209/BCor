<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инструмент Аннотирования Изображений</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Инструмент Аннотирования Изображений</h1>

    <div>
        <label for="imageFolderInput">Выберите папку с изображениями:</label>
        <input type="file" id="imageFolderInput" webkitdirectory directory multiple>
    </div>

    <div id="app" style="display: none;">
        <div id="image-container">
            <img id="current-image" src="#" alt="Текущее изображение">
            <p id="image-name"></p>
        </div>

        <div id="controls">
            <button id="prev-button">Предыдущее</button>
            <button id="next-button">Следующее</button>
        </div>

        <div id="annotation-options">
            <label>
                <input type="radio" name="annotation" value="low"> Low
            </label>
            <label>
                <input type="radio" name="annotation" value="normal" checked> Normal
            </label>
            <label>
                <input type="radio" name="annotation" value="hi"> Hi
            </label>
        </div>

        <div id="file-operations">
            <button id="save-button">Сохранить аннотации</button>
            <label for="load-json-input" class="button-like">Загрузить аннотации</label>
            <input type="file" id="load-json-input" accept=".json" style="display: none;">
         </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
