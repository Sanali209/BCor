<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>


<body style="background-color: grey">
<script type="text/javascript">


    document.onkeydown = function (e) {
        switch (e.keyCode) {
            // on key 1 down send get request "setreit=1" to server
            case 49:
                window.location.href = "{{ url_for('itemEdit', id=image.id) }}?setreit=1";
                break;
            // on key 2 down send get request "setreit=2" to server
            case 50:
                window.location.href = "{{ url_for('itemEdit', id=image.id) }}?setreit=2";
                break;
            // on key 3 down send get request "setreit=3" to server
            case 51:
                window.location.href = "{{ url_for('itemEdit', id=image.id) }}?setreit=3";
                break;
            // on key 4 down send get request "setreit=4" to server
            case 52:
                window.location.href = "{{ url_for('itemEdit', id=image.id) }}?setreit=4";
                break;
            // on key 5 down send get request "setreit=5" to server
            case 53:
                window.location.href = "{{ url_for('itemEdit', id=image.id) }}?setreit=5";
                break;
            // on key left down set next image
            case 39:
                window.location.href = "{{ url_for('itemEdit', id=image.id+1) }}";
                break;
            // on key right down set prev image
            case 37:
                window.location.href = "{{ url_for('itemEdit', id=image.id-1) }}";
        }}

</script>
<img src="{{ url_for('static', filename='images/' + image.id|string) + image.extension }}" class="figure-img img-fluid rounded" alt="image" >
<br>
reiting: {{ image.rating }}
</body>
</html>
