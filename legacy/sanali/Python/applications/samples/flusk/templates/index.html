<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Files</title>

</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

<body style="background-color: grey">

    {% include "Headermenu.html" %}
    <form action="{{ url_for('index') }}" method="get" enctype="multipart/form-data">
        <!-- slider input for parameter similarity float range 0.0 to 1.0-->
        <label for="similarity">similarity</label>
        <input type="range" id="similarity" name="similarity" min="0" max="1" step="0.01" value="{{ similarity }}">
        <!-- swichbox input for parameter mode:show_dubs,refresh_dubs -->
        <label for="mode">mode</label>
        <select name="mode" id="mode">
            <option value="show_dubs">show dubs</option>
            <option value="refresh_dubs">refresh dubs</option>
            <option value="gr_in_folders">grop in folders</option>
        </select>

        <input type="text" name="directory" id="directory" >
        <input type="submit" value="submit">
    </form>
    <div class="">
        items count: {{ dublicates|length }}
    </div>
    {% for key, value in dublicates.items() %}
    <div class="dubGroup container" >
            <div class="row">
                <div class="col">
                        {{ key | replace(worckpath,'') }}({{ value|length }})
                    <div class="row">
                        <div class="col">
                            <img src="data:image/png;base64,{{imagePathTobase64Embed(key)}}" alt="Smiley face" height="256" style="max-width=100%; max-height:256;" >
                        </div>
                    </div>
                </div>
                {% for dub in value %}
                <div class="col">
                    {{ dub[0] | replace(worckpath,'') }}
                    {{ dub[1] }}
                    <div class="row">
                        <div class="col">
                            <img src="data:image/png;base64,{{imagePathTobase64Embed(dub[0])}}" alt="Smiley face" height="256" >
                        </div>
                    </div>
                </div>


                {% endfor %}
            </div>
    </div>






    {% endfor %}

</body>
</html>
