version: '3.8'

services:
  neo4j-agm:
    image: neo4j:5.12.0
    container_name: neo4j-agm
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
    volumes:
      - neo4j-agm-data:/data
      - neo4j-agm-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-agm:
    image: redis:7.2-alpine
    container_name: redis-agm
    ports:
      - "6380:6379"
    volumes:
      - redis-agm-data:/data
    restart: always

  nats-agm:
    image: nats:2.10-alpine
    container_name: nats-agm
    ports:
      - "4222:4222"
      - "8222:8222" # HTTP monitoring
    restart: always

volumes:
  neo4j-agm-data:
  neo4j-agm-logs:
  redis-agm-data:

